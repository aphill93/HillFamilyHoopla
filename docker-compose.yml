version: "3.9"

# Runs Postgres + Redis only.
# The API and web app run locally via Node (see start.sh).

services:
  postgres:
    image: postgres:16-alpine
    container_name: hillfamilyhoopla-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hoopla}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hoopla_dev_secret}
      POSTGRES_DB: ${POSTGRES_DB:-hillfamilyhoopla}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hoopla} -d ${POSTGRES_DB:-hillfamilyhoopla}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - hoopla-network

  redis:
    image: redis:7-alpine
    container_name: hillfamilyhoopla-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_dev_secret}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_secret}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - hoopla-network

  # pgAdmin — optional, run with: docker compose --profile tools up -d
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hillfamilyhoopla-pgadmin
    restart: unless-stopped
    profiles:
      - tools
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hillfamilyhoopla.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-pgadmin_dev_secret}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - hoopla-network

volumes:
  postgres_data:
    name: hillfamilyhoopla-postgres-data
  redis_data:
    name: hillfamilyhoopla-redis-data
  pgadmin_data:
    name: hillfamilyhoopla-pgadmin-data

networks:
  hoopla-network:
    name: hillfamilyhoopla-network
    driver: bridge
