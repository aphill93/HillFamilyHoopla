version: "3.9"

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hillfamilyhoopla-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hoopla}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hoopla_dev_secret}
      POSTGRES_DB: ${POSTGRES_DB:-hillfamilyhoopla}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/src/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hoopla} -d ${POSTGRES_DB:-hillfamilyhoopla}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - hoopla-network

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hillfamilyhoopla-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_dev_secret}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hoopla-network

  # ─── API (Fastify) ─────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: development
    container_name: hillfamilyhoopla-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3001
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-hoopla}:${POSTGRES_PASSWORD:-hoopla_dev_secret}@postgres:5432/${POSTGRES_DB:-hillfamilyhoopla}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_secret}@redis:6379
      JWT_PRIVATE_KEY_PATH: /app/certs/jwt_private.pem
      JWT_PUBLIC_KEY_PATH: /app/certs/jwt_public.pem
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 30d
      BCRYPT_ROUNDS: 12
      CORS_ORIGINS: http://localhost:3000
      RATE_LIMIT_MAX: 100
      RATE_LIMIT_WINDOW_MS: 60000
      RESEND_API_KEY: ${RESEND_API_KEY:-re_placeholder}
      EMAIL_FROM: noreply@hillfamilyhoopla.com
      APP_URL: http://localhost:3000
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev_encryption_key_32chars_padded!}
    ports:
      - "3001:3001"
    volumes:
      - ./api/src:/app/src:ro
      - ./shared:/app/../shared:ro
      - api_certs:/app/certs
    networks:
      - hoopla-network

  # ─── pgAdmin (optional dev tool) ───────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hillfamilyhoopla-pgadmin
    restart: unless-stopped
    profiles:
      - tools
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hillfamilyhoopla.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-pgadmin_dev_secret}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - hoopla-network

volumes:
  postgres_data:
    name: hillfamilyhoopla-postgres-data
  redis_data:
    name: hillfamilyhoopla-redis-data
  api_certs:
    name: hillfamilyhoopla-api-certs
  pgadmin_data:
    name: hillfamilyhoopla-pgadmin-data

networks:
  hoopla-network:
    name: hillfamilyhoopla-network
    driver: bridge
